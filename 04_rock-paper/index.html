<!DOCTYPE html>
    <html>
        <head>
            <meta charset="UTF-8"/>
            <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
            <title>rock-paper-scissors</title> 
            <link rel="stylesheet" href="style.css">
            <script src="script.js" defer></script>
        </head>
        <body>
            <header>
                <h1>rock-paper-scissors</h1>
            </header>
            <main>
                <div id="start-question">
                    <p>What's your choice?</p>
                </div>
                <div id="choice-btns">
                    <button id="rock-btn" class="choice-btn">rock 🪨</button>
                    <button id="paper-btn" class="choice-btn">paper 📃</button>
                    <button id="scissors-btn" class="choice-btn">scissors ✂️</button>
                </div>
                <div id="choice-output"></div>
            </main>
        </body>

    </html>
